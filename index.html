<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单项目对接流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: #fbfbfd;
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== Nav Bar ===== */
  .nav-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(251,251,253,0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 0 24px;
  }
  .nav-inner {
    max-width: 980px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
  }
  .nav-title {
    font-size: 1.05em;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.01em;
  }
  .nav-breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78em;
    color: #86868b;
  }
  .nav-breadcrumb .bc-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #d2d2d7;
  }
  .bc-link {
    color: #86868b;
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }
  .bc-link:hover { color: #1d1d1f; }
  .bc-link.active { color: #1d1d1f; font-weight: 600; }

  /* ===== Hero Section ===== */
  .hero {
    text-align: center;
    padding: 80px 0 48px;
  }
  .hero-eyebrow {
    font-size: 0.88em;
    font-weight: 500;
    color: #6e6e73;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }
  .hero h1 {
    font-size: 3em;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: #1d1d1f;
    margin-bottom: 16px;
  }
  .hero p {
    font-size: 1.15em;
    color: #6e6e73;
    line-height: 1.5;
    max-width: 520px;
    margin: 0 auto;
    font-weight: 400;
  }

  /* ===== Panels ===== */
  .panel {
    display: none;
    animation: panelIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .panel.active { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Section Label ===== */
  .section-label {
    text-align: center;
    margin-bottom: 36px;
  }
  .section-label h2 {
    font-size: 1.75em;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
    margin-bottom: 6px;
  }
  .section-label p {
    font-size: 0.95em;
    color: #86868b;
  }

  /* ===== Selection Cards ===== */
  .select-grid {
    display: grid;
    gap: 16px;
    padding-bottom: 80px;
  }
  .select-grid.cols-3 {
    grid-template-columns: repeat(3, 1fr);
  }
  .select-grid.cols-2 {
    grid-template-columns: repeat(2, 1fr);
  }

  .select-card {
    background: #fff;
    border-radius: 18px;
    padding: 40px 28px 36px;
    text-align: center;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border: 1px solid rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
  }
  .select-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.35s;
    background: linear-gradient(135deg, rgba(0,113,227,0.03), rgba(0,113,227,0.06));
    pointer-events: none;
  }
  .select-card:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    border-color: rgba(0,113,227,0.2);
  }
  .select-card:hover::after { opacity: 1; }
  .select-card:active { transform: scale(0.98); }

  .card-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6em;
    margin: 0 auto 20px;
    background: #f5f5f7;
    transition: transform 0.35s;
  }
  .select-card:hover .card-icon { transform: scale(1.08); }

  .card-title {
    font-size: 1.15em;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .card-desc {
    font-size: 0.82em;
    color: #86868b;
    line-height: 1.45;
  }

  /* Card icon bg tints */
  .icon-green { background: #e8f8ef; }
  .icon-blue { background: #e8f0fe; }
  .icon-gold { background: #fef3e2; }
  .icon-orange { background: #fde8ec; }
  .icon-purple { background: #f0e8fe; }
  .icon-teal { background: #e2f5f0; }

  /* ===== Back Link ===== */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #0071e3;
    text-decoration: none;
    font-size: 0.88em;
    font-weight: 400;
    margin-bottom: 28px;
    cursor: pointer;
    transition: color 0.2s;
    border: none;
    background: none;
    padding: 0;
  }
  .back-link:hover { color: #0077ed; text-decoration: underline; }
  .back-link svg { width: 16px; height: 16px; }

  /* ===== Result Header ===== */
  .result-header {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 20px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .rh-top {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 20px;
  }
  .rh-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6em;
    background: #f5f5f7;
    flex-shrink: 0;
  }
  .rh-info h2 {
    font-size: 1.5em;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
    margin-bottom: 4px;
  }
  .rh-info p {
    font-size: 0.88em;
    color: #86868b;
  }
  .rh-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .rh-tag {
    padding: 5px 14px;
    border-radius: 980px;
    font-size: 0.78em;
    font-weight: 500;
  }
  .rh-tag.level {
    background: #e8f8ef;
    color: #1a7f37;
  }
  .rh-tag.task {
    background: #e8f0fe;
    color: #1a56db;
  }

  /* ===== Progress ===== */
  .progress-wrap {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid rgba(0,0,0,0.04);
  }
  .progress-bar-bg {
    height: 4px;
    background: #e8e8ed;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #0071e3;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .progress-text {
    text-align: right;
    font-size: 0.75em;
    color: #86868b;
    margin-top: 8px;
  }

  /* ===== Flow Section ===== */
  .flow-section {
    background: #fff;
    border-radius: 20px;
    margin-bottom: 16px;
    border: 1px solid rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .flow-header {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .flow-header:hover { background: #fafafa; }

  .flow-header .f-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2em;
    background: #f5f5f7;
    flex-shrink: 0;
  }
  .flow-header .f-info { flex: 1; }
  .flow-header h3 {
    font-size: 1.05em;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.01em;
  }
  .flow-header .f-sub {
    font-size: 0.78em;
    color: #86868b;
    margin-top: 2px;
  }
  .flow-header .f-toggle {
    color: #86868b;
    font-size: 0.7em;
    transition: transform 0.3s;
  }
  .flow-header .f-toggle.collapsed { transform: rotate(-90deg); }

  .flow-body {
    max-height: 2000px;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 1;
  }
  .flow-body.collapsed { max-height: 0; opacity: 0; }

  /* ===== Step Item ===== */
  .step-item {
    display: flex;
    align-items: flex-start;
    padding: 16px 28px;
    gap: 16px;
    transition: background 0.15s;
    position: relative;
  }
  .step-item:hover { background: #fafafa; }
  .step-item + .step-item {
    border-top: 1px solid rgba(0,0,0,0.04);
  }

  .step-num {
    width: 30px; height: 30px; min-width: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78em;
    font-weight: 600;
    color: #fff;
    background: #0071e3;
    margin-top: 2px;
  }

  .step-content {
    flex: 1;
    line-height: 1.65;
    font-size: 0.92em;
    color: #1d1d1f;
    padding-top: 3px;
  }
  .step-content strong {
    color: #1d1d1f;
    font-weight: 600;
  }
  .step-content .hl {
    display: inline-block;
    background: #f0f0f2;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: 600;
    color: #1d1d1f;
    font-size: 0.95em;
  }

  /* ===== Checkbox ===== */
  .check-btn {
    width: 28px; height: 28px; min-width: 28px;
    border-radius: 50%;
    border: 1.5px solid #d2d2d7;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    margin-top: 3px;
  }
  .check-btn:hover {
    border-color: #0071e3;
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .check-btn.checked {
    border-color: #0071e3;
    background: #0071e3;
  }
  .check-btn .checkmark {
    color: #fff;
    font-size: 0.85em;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s;
  }
  .check-btn.checked .checkmark {
    opacity: 1;
    transform: scale(1);
  }

  /* ===== Completion Banner ===== */
  .completion-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .completion-overlay.show { opacity: 1; pointer-events: auto; }

  .completion-card {
    background: #fff;
    border-radius: 24px;
    padding: 56px 48px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    transform: scale(0.95) translateY(12px);
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-shadow: 0 24px 80px rgba(0,0,0,0.12);
  }
  .completion-overlay.show .completion-card {
    transform: scale(1) translateY(0);
  }
  .completion-card .c-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34c759, #30d158);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 1.8em;
    box-shadow: 0 4px 20px rgba(52,199,89,0.3);
  }
  .completion-card h2 {
    font-size: 1.35em;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -0.02em;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .completion-card p {
    font-size: 0.9em;
    color: #86868b;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .completion-card .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ===== Buttons (Apple style) ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 28px;
    border-radius: 980px;
    font-size: 0.92em;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    border: none;
    letter-spacing: -0.01em;
  }
  .btn-primary {
    background: #0071e3;
    color: #fff;
  }
  .btn-primary:hover { background: #0077ed; }
  .btn-secondary {
    background: transparent;
    color: #0071e3;
    border: 1px solid #0071e3;
  }
  .btn-secondary:hover { background: rgba(0,113,227,0.04); }

  /* ===== Confetti (subtle) ===== */
  .confetti {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 50%;
    z-index: 1001;
    pointer-events: none;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 0.8; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) scale(0.3); }
  }

  /* ===== Footer ===== */
  .footer {
    text-align: center;
    padding: 64px 0 40px;
    font-size: 0.75em;
    color: #86868b;
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: 40px;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .hero { padding: 56px 0 36px; }
    .hero h1 { font-size: 2.2em; }
    .hero p { font-size: 1em; }
    .select-grid.cols-3 { grid-template-columns: 1fr; }
    .select-grid.cols-2 { grid-template-columns: 1fr; }
    .select-card { padding: 32px 24px 28px; }
    .result-header { padding: 24px; }
    .step-item { padding: 14px 20px; gap: 12px; }
    .flow-header { padding: 16px 20px; }
    .completion-card { padding: 40px 28px; }
  }
  @media (max-width: 480px) {
    .hero h1 { font-size: 1.8em; }
    .nav-breadcrumb { display: none; }
  }
</style>
</head>
<body>

<!-- ===== Nav Bar ===== -->
<nav class="nav-bar">
  <div class="nav-inner">
    <div class="nav-title">订单流程</div>
    <div class="nav-breadcrumb">
      <span class="bc-link active" id="navBc1">选组别</span>
      <span class="bc-dot"></span>
      <span class="bc-link" id="navBc2">选事项</span>
      <span class="bc-dot"></span>
      <span class="bc-link" id="navBc3">看流程</span>
    </div>
  </div>
</nav>

<div class="container">

  <!-- ===== Panel 1: 选组别 ===== -->
  <div class="panel active" id="panel1">
    <div class="hero">
      <p class="hero-eyebrow">内部流程指引</p>
      <h1>订单项目对接流程</h1>
      <p>选择你的组别和要办的事，快速获取对应的操作流程</p>
    </div>
    <div class="section-label">
      <h2>你是哪个组别？</h2>
      <p>选择后进入下一步</p>
    </div>
    <div class="select-grid cols-3">
      <div class="select-card" onclick="selectLevel('初级')">
        <div class="card-icon icon-green">🌱</div>
        <div class="card-title">初级组</div>
        <div class="card-desc">初级业务人员</div>
      </div>
      <div class="select-card" onclick="selectLevel('中级')">
        <div class="card-icon icon-blue">🌿</div>
        <div class="card-title">中级组</div>
        <div class="card-desc">中级业务人员</div>
      </div>
      <div class="select-card" onclick="selectLevel('高级')">
        <div class="card-icon icon-gold">🌳</div>
        <div class="card-title">高级组</div>
        <div class="card-desc">高级业务人员</div>
      </div>
    </div>
  </div>

  <!-- ===== Panel 2: 选事项 ===== -->
  <div class="panel" id="panel2">
    <button class="back-link" onclick="goBack(1)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
      重新选择组别
    </button>
    <div class="section-label">
      <h2>你要做什么？</h2>
      <p>当前：<strong id="currentLevel"></strong></p>
    </div>
    <div class="select-grid cols-2">
      <div class="select-card" onclick="selectTask('设计下单书')">
        <div class="card-icon icon-blue">🎨</div>
        <div class="card-title">下设计单</div>
        <div class="card-desc">设计下单书流程</div>
      </div>
      <div class="select-card" onclick="selectTask('大货下单书')">
        <div class="card-icon icon-orange">📦</div>
        <div class="card-title">下大货下单书</div>
        <div class="card-desc">大货生产下单</div>
      </div>
      <div class="select-card" onclick="selectTask('大货确认书')">
        <div class="card-icon icon-purple">✅</div>
        <div class="card-title">下大货确认书</div>
        <div class="card-desc">大货确认流程</div>
      </div>
      <div class="select-card" onclick="selectTask('修改单')">
        <div class="card-icon icon-teal">🔄</div>
        <div class="card-title">下修改单</div>
        <div class="card-desc">大货修改单流程</div>
      </div>
    </div>
  </div>

  <!-- ===== Panel 3: 流程结果 ===== -->
  <div class="panel" id="panel3">
    <button class="back-link" onclick="goBack(2)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L5 8l5 5"/></svg>
      重新选择
    </button>

    <div class="result-header">
      <div class="rh-top">
        <div class="rh-icon" id="rhIcon"></div>
        <div class="rh-info">
          <h2 id="rhTitle"></h2>
          <p id="rhDesc"></p>
        </div>
      </div>
      <div class="rh-tags">
        <span class="rh-tag level" id="rhTagLevel"></span>
        <span class="rh-tag task" id="rhTagTask"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">已完成 0 / 0 步</div>
      </div>
    </div>

    <div id="flowContainer"></div>
  </div>

  <div class="footer">内部流程参考 · 请以最新版本为准</div>
</div>

<!-- ===== Completion Overlay ===== -->
<div class="completion-overlay" id="completionBanner">
  <div class="completion-card">
    <div class="c-icon">✓</div>
    <h2>感谢你为项目精准交付报价护航！</h2>
    <p>所有流程步骤已全部完成，辛苦啦！</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="resetFlow()">重新打勾</button>
      <button class="btn btn-secondary" onclick="backToHome()">返回首页</button>
    </div>
  </div>
</div>

<script>
let selectedLevel = '';
let selectedTask = '';
let completed = false;

// ===== Navigation =====
function showPanel(n) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel' + n).classList.add('active');
  for (let i = 1; i <= 3; i++) {
    const bc = document.getElementById('navBc' + i);
    bc.classList.toggle('active', i === n);
    bc.style.color = i <= n ? '#1d1d1f' : '';
    bc.style.fontWeight = i === n ? '600' : '';
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectLevel(level) {
  selectedLevel = level;
  document.getElementById('currentLevel').textContent = level + '组';
  showPanel(2);
}

function selectTask(task) {
  selectedTask = task;
  renderFlow();
  showPanel(3);
  completed = false;
}

function goBack(toPanel) {
  if (toPanel === 1) { selectedLevel = ''; showPanel(1); }
  else if (toPanel === 2) { showPanel(2); }
}

function backToHome() {
  document.getElementById('completionBanner').classList.remove('show');
  selectedLevel = '';
  selectedTask = '';
  completed = false;
  showPanel(1);
}

function resetFlow() {
  document.getElementById('completionBanner').classList.remove('show');
  completed = false;
  document.querySelectorAll('.check-btn.checked').forEach(b => b.classList.remove('checked'));
  updateProgress();
}

// ===== Flow Data =====
function getFlowData(level, task) {
  const isJunior = level === '初级';
  const approver = isJunior ? '玉鹏' : 'Jay';
  const approverTag = isJunior ? '提交给玉鹏' : '提交给Jay';
  const isModify = task === '修改单';

// ===== Render =====
function renderFlow() {
  const data = getFlowData(selectedLevel, selectedTask);
  const iconEl = document.getElementById('rhIcon');
  iconEl.textContent = data.icon;
  iconEl.className = 'rh-icon ' + (data.iconClass || '');
  document.getElementById('rhTitle').textContent = data.title;
  document.getElementById('rhDesc').textContent = data.desc;
  document.getElementById('rhTagLevel').textContent = selectedLevel + '组';
  document.getElementById('rhTagTask').textContent = data.tagTask;

  let totalSteps = 0;
  data.sections.forEach(s => totalSteps += s.steps.length);

  let html = '';
  data.sections.forEach(section => {
    html += '<div class="flow-section">';
    html += '<div class="flow-header" onclick="toggleSection(this)">';
    html += '<div class="f-icon ' + section.iconClass + '">' + section.icon + '</div>';
    html += '<div class="f-info"><h3>' + section.title + '</h3>';
    html += '<div class="f-sub">' + section.subtitle + '</div></div>';
    html += '<span class="f-toggle">▼</span></div>';
    html += '<div class="flow-body">';
    section.steps.forEach(step => {
      html += '<div class="step-item">';
      html += '<div class="step-num">' + step.num + '</div>';
      html += '<div class="step-content">' + step.html + '</div>';
      html += '<button class="check-btn" onclick="toggleCheck(this)"><span class="checkmark">✓</span></button>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  document.getElementById('flowContainer').innerHTML = html;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = '已完成 0 / ' + totalSteps + ' 步';
  document.getElementById('progressBar').dataset.total = totalSteps;
}

// ===== Interactions =====
function toggleSection(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.f-toggle');
  body.classList.toggle('collapsed');
  icon.classList.toggle('collapsed');
}

function toggleCheck(btn) {
  btn.classList.toggle('checked');
  updateProgress();
}

function updateProgress() {
  const total = parseInt(document.getElementById('progressBar').dataset.total) || 0;
  if (total === 0) return;
  const checked = document.querySelectorAll('#flowContainer .check-btn.checked').length;
  const pct = Math.round((checked / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = '已完成 ' + checked + ' / ' + total + ' 步';
  if (checked === total && !completed) {
    completed = true;
    setTimeout(() => {
      document.getElementById('completionBanner').classList.add('show');
      launchConfetti();
    }, 400);
  }
}

function launchConfetti() {
  const colors = ['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5ac8fa','#ff2d55','#ffd60a'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 6 + 4) + 'px';
    el.style.height = el.style.width;
    el.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
    el.style.animationDelay = (Math.random() * 1) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}
